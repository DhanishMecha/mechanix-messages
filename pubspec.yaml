name: mechanix_messages
description: "A mechanix app to send and receive messages"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  uuid: ^4.5.3
  intl: ^0.20.2
  mocktail: ^1.0.5
  show_fps: ^1.1.0
  bloc: ^9.2.1
  objectbox: ^5.3.2
  bloc_test: ^10.0.0
  mechanix_contacts:
    git: 
      url: https://github.com/mecha-org/mechanix-contacts.git
      ref: b1b7a30d901a14fdcf45a648182e975df40e0223

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  objectbox_generator: ^5.3.2

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
